<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Spaces</title>
</head>

<body>

<h1>Here are our spaces</h1>

<ul>
    <!-- using th:each we tell Thymeleaf to render an li for each review -->
    <li th:each="space : ${spaces}">
        <strong th:text="${space.name}"></strong> -
        <span th:text="${space.description}"></span>
        (<span th:text="'£' + ${space.price}"></span> per night)
    </li>
</ul>

</body>

</html>
